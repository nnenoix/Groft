# ClaudeOrch — конфигурация моделей
# Меняй модели здесь, не в файлах агентов

models:
  opus: claude-opus-4-7              # тимлид — самая умная модель
  backend-dev: claude-sonnet-4-6     # backend разработчик
  frontend-dev: claude-sonnet-4-6    # frontend разработчик
  tester: claude-haiku-4-5-20251001  # тестировщик — можно дешевле
  reviewer: claude-sonnet-4-6        # ревьюер

# Доступные модели:
# claude-opus-4-7 — самый умный, медленнее
# claude-sonnet-4-6 — баланс качества и скорости
# claude-haiku-4-5-20251001 — быстрый и дешёвый

# tmux — куда слать команды для Opus-тимлида и агентов (ключ — имя агента).
# Пока все исполнители живут в окне Opus (Agent Teams in-process), поэтому дефолт один target.
tmux:
  lead_target: "claudeorch:0"
  agent_targets:
    opus: "claudeorch:0"
